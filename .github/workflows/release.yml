# Tag-triggered npm release + draft GitHub Release.
#
# This repo is a multi-package monorepo. Each package releases under its
# own tag-prefix, so a single tag never tries to publish two packages.
#
# How to cut a release:
#   1. Bump version in packages/<pkg>/package.json
#   2. Commit ("chore(release): <pkg> X.Y.Z") — `chore(release)` is
#      filtered out of cliff.toml so the bump commit doesn't pollute the
#      next changelog.
#   3. git tag <pkg>-vX.Y.Z && git push origin main --tags
#         e.g. acpx-ai-provider-v0.0.3
#              agent-skills-manager-v0.1.0
#   4. Wait for the workflow to finish, then publish the draft from the
#      Releases page.
#
# Historical tags `v0.0.1` and `v0.0.2` (acpx-ai-provider only) remain
# as immutable history; they no longer trigger this workflow. The
# tag-prefix scheme was adopted 2026-05-11 when agent-skills-manager landed.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NPM_TOKEN — automation token for npmjs.com with publish access
#
# Required repo settings:
#   Settings → Actions → General → Workflow permissions → Read and
#   write permissions (so id-token: write below works for npm
#   provenance).

name: Release (npm publish + draft GitHub release)

on:
  push:
    tags:
      - 'acpx-ai-provider-v[0-9]*'
      - 'agent-mcp-manager-v[0-9]*'
      - 'agent-skills-manager-v[0-9]*'
      - 'acp-probe-v[0-9]*'

permissions:
  contents: write
  id-token: write   # required for npm provenance attestations

jobs:
  release:
    name: Verify, publish, and draft release notes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so git-cliff (and `git describe`)
          # can walk back to the previous tag and compute the changelog
          # range.
          fetch-depth: 0

      - name: Resolve package from tag prefix
        id: pkg
        # The tag dictates which package this release is for. We refuse
        # to proceed on an unrecognized prefix so a typo (e.g.
        # `skill-manager-v0.1.0`) fails loudly instead of publishing the
        # wrong dir.
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            acpx-ai-provider-v*)
              echo "name=acpx-ai-provider" >> "$GITHUB_OUTPUT"
              echo "dir=packages/acpx-ai-provider" >> "$GITHUB_OUTPUT"
              echo "match=acpx-ai-provider-v[0-9]*" >> "$GITHUB_OUTPUT"
              ;;
            agent-mcp-manager-v*)
              echo "name=agent-mcp-manager" >> "$GITHUB_OUTPUT"
              echo "dir=packages/agent-mcp-manager" >> "$GITHUB_OUTPUT"
              echo "match=agent-mcp-manager-v[0-9]*" >> "$GITHUB_OUTPUT"
              ;;
            agent-skills-manager-v*)
              echo "name=agent-skills-manager" >> "$GITHUB_OUTPUT"
              echo "dir=packages/agent-skills-manager" >> "$GITHUB_OUTPUT"
              echo "match=agent-skills-manager-v[0-9]*" >> "$GITHUB_OUTPUT"
              ;;
            acp-probe-v*)
              echo "name=acp-probe" >> "$GITHUB_OUTPUT"
              echo "dir=packages/acp-probe" >> "$GITHUB_OUTPUT"
              echo "match=acp-probe-v[0-9]*" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown tag prefix: $TAG" >&2
              exit 1
              ;;
          esac

      - name: Install Bun
        # Reads the version from `.bun-version` — bumping Bun is a
        # one-line change to that file, reviewed like any other source
        # change.
        uses: oven-sh/setup-bun@v2

      - name: Install Node + npm (for the publish step)
        # ubuntu-latest already ships npm, but `setup-node` pins the
        # version explicitly and writes ~/.npmrc with the npmjs
        # registry URL + `${NODE_AUTH_TOKEN}` placeholder, which is
        # cleaner than echoing the token ourselves. All other steps
        # use Bun — Node is here only because `bun publish`'s auth
        # handling on Bun 1.3.x doesn't read NPM_TOKEN reliably.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Re-run the full check suite before publishing. A green tag must
      # mean a green workspace — never trust the PR-time CI alone since
      # post-merge changes can shift state.
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Fallow
        run: bun run fallow
      - name: Tests
        run: bun test
      - name: Build
        run: bun run build

      - name: Determine previous tag (for changelog range)
        id: previous_tag
        run: |
          # We only care about prior releases of the SAME package, so the
          # match pattern is the per-package tag prefix from the resolve
          # step. For the very first release of a package this errors
          # (no prior tag matches) — treat as the "first release" case
          # and short-circuit changelog generation.
          set +e
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "${{ steps.pkg.outputs.match }}" "${GITHUB_REF_NAME}^" 2>/dev/null)
          set -e
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "first_release=true" >> "$GITHUB_OUTPUT"
            echo "No previous tag found — this is the first release of ${{ steps.pkg.outputs.name }}."
          else
            echo "first_release=false" >> "$GITHUB_OUTPUT"
            echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
            echo "Previous tag: $PREVIOUS_TAG"
          fi

      - name: Generate changelog (subsequent releases only)
        if: steps.previous_tag.outputs.first_release == 'false'
        id: changelog
        # git-cliff parses conventional-commit messages between the
        # previous tag and the new tag, groups them by type per
        # cliff.toml, and exposes the rendered markdown as
        # `steps.changelog.outputs.content`.
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --strip header ${{ steps.previous_tag.outputs.previous_tag }}..${{ github.ref_name }}

      - name: Publish to npm
        env:
          # `setup-node` writes a ~/.npmrc that interpolates
          # `${NODE_AUTH_TOKEN}` (not NPM_TOKEN) at publish time, so
          # this is the env-var name we have to use.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # `--access public` is required for unscoped or fresh-scoped
        # packages on the free tier. `--provenance` attaches an
        # OIDC-signed provenance attestation so npm shows the
        # "built and signed on a cloud builder" badge.
        run: |
          cd "${{ steps.pkg.outputs.dir }}"
          npm publish --access public --provenance

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # DRAFT — never auto-publish. Review the body in the GitHub
          # UI and click Publish when ready.
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # First release → literal "first release" body. Otherwise →
          # the git-cliff-rendered changelog. The `||` fallback fires
          # when the changelog step was skipped (its output is empty).
          body: ${{ steps.changelog.outputs.content || 'first release' }}
